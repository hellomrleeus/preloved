<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Preloved of DongDong · 冬冬二手好物</title>
<meta name="description" content="Preloved of DongDong — curated secondhand goods in Sudbury.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header class="site">
  <div class="container header-inner">
    <a class="brand-mini" href="index.html">
      <span class="logo" aria-hidden="true">🌿</span>
      <span class="brand-text">
        <span class="brand-name" data-brand-name>Preloved</span>
        <span class="brand-tag" data-brand-tag>of DongDong</span>
      </span>
    </a>
    <div class="header-actions">
      <button class="btn ghost" type="button" data-lang-btn>中文</button>
      <button class="btn ghost" type="button" data-sold-btn>Hide sold</button>
    </div>
  </div>
</header>

<section class="hero">
  <div class="container hero-inner">
    <span class="hero-kicker" data-hero-kicker>✨ Curated · Sudbury · Pre-loved</span>
    <h1 class="hero-title">
      <span data-hero-line1>Great stuff,</span>
      <em data-hero-line2>second time around.</em>
    </h1>
    <p class="hero-sub" data-hero-sub>A tiny catalog of things I'm passing on — all in Sudbury, all ready for a new home.</p>
    <div class="hero-stickers" aria-hidden="true">
      <span class="sticker s1">🛋️</span>
      <span class="sticker s2">🍚</span>
      <span class="sticker s3">⚡</span>
      <span class="sticker s4">🎁</span>
    </div>
  </div>
</section>

<main class="container main">
  <div class="toolbar">
    <nav class="category-tabs" aria-label="Categories"></nav>
    <div class="count" data-count></div>
  </div>
  <section class="grid" aria-live="polite"></section>
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-mark">Preloved <em>of DongDong</em></div>
    <div class="footer-copy">© <span data-year></span> · Made with <span aria-hidden="true">💛</span> in Sudbury</div>
  </div>
</footer>

<script src="assets/i18n.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
